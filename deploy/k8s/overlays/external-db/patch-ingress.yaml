# Замените vpn.example.com на ваш домен (здесь и в patch-config.yaml).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vpnhub
  namespace: vpnhub
spec:
  tls:
    - hosts: ["vpn.example.com"]
      secretName: vpnhub-tls
  rules:
    - host: vpn.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vpnhub
                port:
                  number: 80
