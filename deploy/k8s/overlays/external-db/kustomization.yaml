apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vpnhub

# Приложение БЕЗ встроенной БД. Адрес внешнего Postgres задаётся в Secret.DATABASE_URL
# (host — ваш managed-Postgres, обычно + ?ssl=require).
resources:
  - ../../base

images:
  - name: ghcr.io/alexeyshalaev/vpn-hub
    newTag: latest

patches:
  - path: patch-hostname.yaml
