apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vpnhub

# Приложение + встроенный PostgreSQL 17.
resources:
  - ../../base
  - postgres-service.yaml
  - postgres-statefulset.yaml

# Пин версии образа для окружения (замените latest на конкретный релиз, напр. 1.2.3).
images:
  - name: ghcr.io/alexeyshalaev/vpn-hub
    newTag: latest

# Домен окружения — правит Ingress (host + TLS) и VPNHUB_BASE_URL разом.
patches:
  - path: patch-hostname.yaml
