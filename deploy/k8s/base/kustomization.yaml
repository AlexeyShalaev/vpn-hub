apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vpnhub

# База = приложение (БД-агностично: адрес БД берётся из Secret.DATABASE_URL).
resources:
  - namespace.yaml
  - configmap.yaml
  - app-pvc.yaml
  - app-deployment.yaml
  - app-service.yaml
  - ingress.yaml

# secret.example.yaml — ШАБЛОН, применяется вручную (kubectl apply -f secret.yaml).
# postgres-*.yaml — подключаются только в overlays/bundled-db (встроенная БД).
