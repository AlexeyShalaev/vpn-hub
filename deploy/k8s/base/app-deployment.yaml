apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpnhub
  namespace: vpnhub
  labels:
    app.kubernetes.io/name: vpnhub
spec:
  # 1 реплика — осознанный дефолт: фоновый планировщик (бэкапы/монитор/синк) работает
  # в каждом поде без лидер-элекшена, поэтому replicas>1 дублирует фоновую работу.
  # Миграции при этом безопасны (advisory-lock), но планировщик — нет.
  replicas: 1
  strategy:
    type: Recreate   # RWO-том: старый под освобождает его до старта нового
  selector:
    matchLabels:
      app.kubernetes.io/name: vpnhub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vpnhub
    spec:
      # SA с правом patch на собственный Deployment — для самообновления из панели (см. rbac.yaml).
      serviceAccountName: vpnhub
      # k8s инжектит для каждого Service переменные вида VPNHUB_PORT=tcp://<ip>:<port>; приложению
      # они не нужны и ломали разбор настроек (имя сервиса `vpnhub` → VPNHUB_PORT). Отключаем.
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000     # образ работает под uid/gid 1000 (пользователь app)
        runAsGroup: 1000
        fsGroup: 1000       # чтобы том vpnhub-state был доступен на запись uid 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vpnhub
          image: ghcr.io/alexeyshalaev/vpn-hub:latest   # тег пиньте в overlay (images:)
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: vpnhub-config
            - secretRef:
                name: vpnhub-secrets
          volumeMounts:
            - name: state
              mountPath: /var/lib/vpnhub/backups
              subPath: backups
            - name: state
              mountPath: /var/lib/vpnhub/data
              subPath: data
          # startupProbe закрывает медленный первый старт (миграции до приёма трафика).
          startupProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 60     # до ~5 мин на первую миграцию
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            # /readyz проверяет БД и отвечает 503 при недоступной — под выводится из
            # эндпоинтов Service, пока база недоступна. Старт/liveness — на /healthz (без БД).
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { memory: "512Mi" }   # только память; CPU-лимит не ставим (throttling)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: vpnhub-state
