apiVersion: v1
kind: Namespace
metadata:
  name: vpnhub
  labels:
    app.kubernetes.io/name: vpnhub
    # Namespace работает в режиме Pod Security Standard "restricted".
    # Манифесты app и Postgres написаны так, чтобы его проходить.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
