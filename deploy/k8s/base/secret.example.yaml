apiVersion: v1
kind: Secret
metadata:
  name: vpnhub-secrets
  namespace: vpnhub
type: Opaque
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ ШАБЛОН. НЕ коммитьте реальные значения. Скопируйте в secret.yaml,        │
# │ подставьте секреты и примените: kubectl apply -f secret.yaml            │
# │ (secret.yaml добавьте в .gitignore). Для GitOps — SOPS / Sealed Secrets │
# │ / External Secrets Operator.                                            │
# └─────────────────────────────────────────────────────────────────────────┘
stringData:
  # openssl rand -hex 32 — ключ восстановления (секреты + бэкапы). ОБЯЗАТЕЛЕН на https.
  VPNHUB_MASTER_KEY: "REPLACE_openssl_rand_hex_32"

  # Пароль встроенного Postgres (используется StatefulSet'ом и в DATABASE_URL ниже).
  # При внешней БД (overlays/external-db) — не нужен.
  POSTGRES_PASSWORD: "REPLACE_db_password"

  # DSN. Драйвер asyncpg обязателен. host = имя Service Postgres (vpnhub-postgres)
  # для встроенной БД; для внешней — хост managed-Postgres (+ ?ssl=require).
  DATABASE_URL: "postgresql+asyncpg://vpnhub:REPLACE_db_password@vpnhub-postgres:5432/vpnhub"

  # Необязательно: первичный админ (иначе — setup-экран при первом входе).
  # VPNHUB_ADMIN_PHONE: "+70000000000"
  # VPNHUB_ADMIN_PASSWORD: "REPLACE"
