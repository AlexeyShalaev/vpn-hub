# Единая точка истины качества — те же проверки локально, в pre-commit и в CI.
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.25
    hooks:
      - id: uv-lock
        files: ^backend/(pyproject\.toml|uv\.lock)$
        args: [--project, backend]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=6144]  # демо-медиа (docs/assets/reel/*.mp4/gif) крупнее дефолтных 500 КБ
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: debug-statements
      - id: no-commit-to-branch
        args: [--branch, master]

  # Backend quality — ровно как `make check`/`make fmt` (ruff/mypy из backend uv-окружения).
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (backend)
        entry: bash -c 'cd backend && uv run ruff check --fix .'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
      - id: ruff-format
        name: ruff format (backend)
        entry: bash -c 'cd backend && uv run ruff format .'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
      - id: mypy
        name: mypy (backend)
        entry: bash -c 'cd backend && uv run mypy src'
        language: system
        types: [python]
        files: ^backend/src/
        pass_filenames: false

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
