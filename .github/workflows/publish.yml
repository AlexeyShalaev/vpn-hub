name: Publish image

# release-please пушит тег v<semver> при мерже релизного PR — на него собираем и
# публикуем один Docker-образ (FastAPI: API + статика React) в GitHub Container Registry.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # QEMU нужен для кросс-сборки arm64 на amd64-раннере.
      # Third-party actions запинены на commit-SHA (supply-chain); комментарий # vX — для Dependabot.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build date
        id: build
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # ── Сначала собираем amd64 локально и проверяем, что релизный образ РЕАЛЬНО стартует.
      #    Слои кэшируются (gha) → финальный multi-arch build ниже переиспользует их.
      - name: Build amd64 for smoke
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          # lowercase-тег совпадает с image в deploy/compose → compose поднимет локальный образ.
          tags: ghcr.io/alexeyshalaev/vpn-hub:ci
          build-args: |
            VPNHUB_VERSION=${{ steps.meta.outputs.version }}
            VPNHUB_BUILT=${{ steps.build.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke (compose) — не публикуем то, что не поднимается
        working-directory: deploy/compose
        run: |
          set -euo pipefail
          {
            echo "VPNHUB_TAG=ci"
            echo "VPNHUB_MASTER_KEY=$(openssl rand -hex 32)"
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 32)"
            echo "VPNHUB_HTTP_ADDR=127.0.0.1:8000"
          } > .env
          docker compose up -d
          ok=0
          for _ in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1 && { ok=1; break; }
            sleep 3
          done
          [ "$ok" = 1 ] || { echo "::error::релизный образ не проходит /healthz — публикация отменена"; docker compose logs --no-color; exit 1; }
          ready=0
          for _ in $(seq 1 40); do
            [ "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/readyz || true)" = 200 ] && { ready=1; break; }
            sleep 3
          done
          [ "$ready" = 1 ] || { echo "::error::readyz != 200 (миграции/БД)"; docker compose logs --no-color; exit 1; }
          docker compose down -v || true
          echo "✅ smoke прошёл — публикуем"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          # amd64 (VPS) + arm64 (Apple Silicon, Ampere/Graviton).
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VPNHUB_VERSION=${{ steps.meta.outputs.version }}
            VPNHUB_BUILT=${{ steps.build.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
