name: Docs

on:
  push:
    branches: [master]
    # Собираем сайт только когда меняется его источник — иначе каждый push в master
    # (в т.ч. релизный коммит сразу за merge фичи) плодит лишний деплой Pages и гонки.
    paths:
      - "docs/**"
      - "zensical.toml"
      - "backend/CHANGELOG.md" # копируется в docs/changelog.md на сборке
      - ".github/workflows/docs.yml"
  workflow_dispatch: # ручной перезапуск, если деплой Pages моргнул

permissions:
  contents: read
  pages: write
  id-token: write

# Один активный деплой Pages; при новом push в master отменяем ещё не завершившийся
# предыдущий — иначе релизный коммит следом за merge гонится с ним на окружении
# github-pages, и опоздавший падает с «Deployment failed, try again later».
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: cp backend/CHANGELOG.md docs/changelog.md
      - run: uvx zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      # Pages разрешает один активный деплой на окружение и «доводит» его асинхронно,
      # поэтому push сразу за предыдущим (merge фичи → релизный коммит) ловит
      # «Deployment failed, try again later» уже ПОСЛЕ того, как первый job завершился
      # (отменять concurrency нечего). Это транзиентная гонка — делаем вторую попытку.
      - id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Settle before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 45
      - name: Retry Pages deployment
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v5
